services:
  db:
    image: postgres:16-alpine
    container_name: savoir-link-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: savoir-link
    ports:
      - "5432:5432"
    volumes:
      - savoir-link-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d savoir-link"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  savoir-link-pgdata:
